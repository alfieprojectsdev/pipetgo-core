name: AI PR Reviewer

# Opt-in: add the "ai-review" label to a PR to trigger this workflow.
# Use when /review-pr (interactive Claude Code skill) is not available —
# e.g. for external contributor PRs or async review without a local session.
on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'ai-review'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: .github/ai-reviewer/package-lock.json

      - name: Install dependencies
        working-directory: .github/ai-reviewer
        run: npm install

      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ steps.pr.outputs.number }} \
            --repo ${{ github.repository }} > /tmp/pr.diff
          echo "Diff size: $(wc -c < /tmp/pr.diff) bytes"

      - name: Run AI Review
        working-directory: .github/ai-reviewer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: node index.js < /tmp/pr.diff
